<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #000;
    color: white;
}

.table{
    margin-top: 30px;
}

th{
    color: #ff6600;
}

tr:hover{
    background: #111;
}

.top{
    color: #ff6600;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="container">

<h2 class="text-center mt-4">🏆 Leaderboard</h2>

<table class="table table-dark text-center">

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Subject</th>
<th>Score</th>
<th>%</th>
</tr>
</thead>

<tbody>

{% for row in data %}

<tr>
<td class="{% if loop.index <= 3 %}top{% endif %}">
{{ loop.index }}
</td>

<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>

<td>{{ row[3] }}/{{ row[4] }}</td>

<td>
{{ (row[3] / row[4] * 100)|round(1) }}%
</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center">
<a href="/quiz" class="btn btn-warning">Back</a>
</div>

</div>

</body>
</html>
