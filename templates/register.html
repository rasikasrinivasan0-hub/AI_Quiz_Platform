<!DOCTYPE html>
<html>
<head>
<title>Register - AI Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="main-card text-center" style="width:350px;">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h2 class="mt-3">Register</h2>

<form method="POST" action="/register">

<input type="text" name="name" class="form-control mt-3" placeholder="Full Name" required>

<input type="email" name="email" class="form-control mt-3" placeholder="Email" required>

<input type="text" name="phone" class="form-control mt-3" placeholder="Phone Number" required>

<input type="password" name="password" class="form-control mt-3" placeholder="Password" required>

<input type="password" name="confirm_password" class="form-control mt-3" placeholder="Confirm Password" required>

<button type="submit" class="btn btn-custom w-100 mt-4">Register</button>

</form>

<p class="mt-3">
Already have an account? 
<a href="/login">Login</a>
</p>

</div>

</div>

</body>
</html>
