<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="main-card text-center" style="width:350px;">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h2 class="mt-3">Login</h2>

<form method="POST">

<input type="email" name="email" class="form-control mt-3" placeholder="Email" required>

<input type="password" name="password" class="form-control mt-3" placeholder="Password" required>

<button class="btn btn-custom w-100 mt-4">Login</button>

</form>

<p class="mt-3">
Don't have an account? <a href="/register">Register</a>
</p>

</div>

</div>

</body>
</html>
