<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="main-card text-center">

<img src="{{ url_for('static', filename='logo.png') }}" width="100">

<h2 class="title-text mt-3">
AI-Powered Quiz System
</h2>

<p>Test your knowledge with AI quizzes</p>

<form action="/quiz" method="post">

<input type="text" name="topic" class="form-control mt-3" placeholder="Enter Topic" required>

<select name="difficulty" class="form-control mt-3">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button class="btn btn-custom mt-4">Start Quiz</button>

</form>

<div class="mt-4">
<a href="/profile" class="btn btn-light">Profile</a>
<a href="/history" class="btn btn-light">History</a>
<a href="/leaderboard" class="btn btn-light">Leaderboard</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>
</div>
