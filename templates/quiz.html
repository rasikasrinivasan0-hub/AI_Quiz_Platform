<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #000;
    color: white;
}

.container{
    margin-top: 40px;
}

.card{
    background: #111;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* QUESTION TEXT */
.question-text{
    color: #ffffff;
    font-weight: bold;
}

/* OPTIONS */
label{
    color: #f1f1f1;
    padding: 8px;
    border-radius: 6px;
    display: block;
}

/* HOVER */
label:hover{
    background: #222;
    color: #ff6600;
}

.timer-box{
    position: fixed;
    top: 20px;
    right: 30px;
    font-size: 20px;
    color: #00e6ff;
}

.btn-custom{
    background: #ff6600;
    color: white;
    border: none;
}
</style>

</head>

<body>

<div class="container text-center">

<h2 class="mb-4">Quiz Platform</h2>

<!-- ================= FORM ================= -->
{% if not quiz %}

<form method="POST">

<select name="topic" class="form-control mb-3" required>

<option value="">-- Select Subject --</option>

<option>Python</option>
<option>Java</option>
<option>C</option>
<option>C++</option>
<option>AI</option>
<option>Machine Learning</option>
<option>DBMS</option>
<option>Operating Systems</option>
<option>Computer Networks</option>
<option>Cybersecurity</option>
<option>Cloud Computing</option>
<option>Data Science</option>
<option>Big Data Analytics</option>
<option>OOP</option>
<option>Software Engineering</option>
<option>Web Technology</option>
<option>Computer Graphics</option>
<option>IoT</option>
<option>SQL</option>
<option>R Programming</option>
<option>C#</option>
<option>Advanced Java</option>
<option>Discrete Mathematics</option>
<option>Computer Architecture</option>

</select>

<select name="difficulty" class="form-control mb-3">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>

<button class="btn btn-custom">Generate Quiz</button>

</form>

{% else %}

<!-- ================= TIMER ================= -->
<div class="timer-box">
    Time Left: <span id="timer">20:00</span>
</div>

<h3 class="mb-4">Quiz on {{topic}}</h3>

<form method="POST" action="/result">

<input type="hidden" name="total" value="{{ quiz|length }}">

<!-- ================= QUESTIONS ================= -->
{% for q in quiz %}

{% set q_index = loop.index0 %}

<div class="card text-start">

<p class="question-text">
{{ loop.index }}. {{ q.question }}
</p>

{% for option in q.options %}

<label>
<input type="radio" name="q{{ q_index }}" value="{{ option }}">
<span>{{ option }}</span>
</label>

{% endfor %}

<input type="hidden" name="correct{{ q_index }}" value="{{ q.answer }}">

</div>

{% endfor %}

<button class="btn btn-success">Submit Quiz</button>

</form>

{% endif %}

</div>

<!-- ================= TIMER SCRIPT ================= -->
<script>
window.onload = function(){

    let time = 1200; // 20 minutes
    let timer = document.getElementById("timer");

    if(!timer) return;

    let countdown = setInterval(() => {

        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        timer.innerText = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

        time--;

        if(time < 0){
            clearInterval(countdown);
            alert("Time Up!");
            document.querySelector("form").submit();
        }

    }, 1000);

};
</script>

</body>
</html>
