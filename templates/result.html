<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #000;
    color: white;
}

.card{
    background: #111;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.correct{
    color: #00ff88;
}

.wrong{
    color: #ff4d4d;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">🎉 Quiz Result</h2>

<h4 class="text-center mt-3">Score: {{score}} / {{total}}</h4>

<hr>

{% for r in results %}

<div class="card">

<p><b>Question {{ r.question_no }}</b></p>

<p>
Your Answer:
<span class="{% if r.status == 'correct' %}correct{% else %}wrong{% endif %}">
{{ r.selected }}
</span>
</p>

{% if r.status == "wrong" %}
<p>Correct Answer:
<span class="correct">{{ r.correct }}</span>
</p>
{% endif %}

</div>

{% endfor %}

<div class="text-center">
<a href="/quiz" class="btn btn-warning mt-3">Try Again</a>
<a href="/leaderboard" class="btn btn-primary mt-3">Leaderboard</a>
</div>

</div>

</body>
</html>
